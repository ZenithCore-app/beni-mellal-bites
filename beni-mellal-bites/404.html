<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BeniBites - Food Delivery in Beni Mellal</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // This script preserves the original path and redirects to the app
      (function() {
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        
        // Store the original path for the app to handle
        sessionStorage.setItem('redirect', path);
        
        // Redirect to the app's index.html with the original path
        window.location.replace('/beni-mellal-bites/' + search + hash);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <p>Redirecting to BeniBites...</p>
  </body>
</html>
